<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" type="image/png" sizes="32x32" href="imagens/r0RKvvxgcQpUl0UHAOOJ.png">
</head>
<body>
    <a href="index.html">tela inicial</a>
    <h2>Fale Conosco</h2>
    <form>
        <label for="text">Qual o seu nome?</label>
        <input type="text" name="nome" placeholder="Digite seu nome" required>
        <br>
        <label for="email">Qual o seu email?</label>
        <input type="email" name="email" placeholder="Digite seu email" required>
        <br>
        <label for="tel">Qual o seu telefone?</label>
        <input type="tel" name="telefone" placeholder="Digite seu telefone" required>
        <br>
        <label for="comentarios">Espaço para comentários</label><br>
        <textarea name="comentarios" rows="5" cols="50"></textarea><br>
        <p>Qual a qualidade da nossa locadora?</p>
        <label><input type="radio" name="satisfacao" value="1"> Muito ruim</label><br>
        <label><input type="radio" name="satisfacao" value="2"> Ruim</label><br>
        <label><input type="radio" name="satisfacao" value="3"> Neutra</label><br>
        <label><input type="radio" name="satisfacao" value="4"> Boa</label><br>
        <label><input type="radio" name="satisfacao" value="5"> Muito boa</label><br>
        <br>
        <button type="submit">Enviar Avaliação</button>
    </form>
</body>
<footer>
    <p>© 2024 Xilften</p>
</footer>
</html>
